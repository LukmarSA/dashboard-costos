<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clasificar Productos · LUKMAR S.A.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/main.css">
<style>
  .filtros-bar {
    display:flex; gap:8px; align-items:center; flex-wrap:wrap;
    margin-bottom:1rem; padding:0.75rem 1rem;
    background:var(--blanco); border:1px solid var(--gris-1); border-radius:var(--r);
  }
  .filtros-bar select, .filtros-bar input {
    padding:6px 10px; border:1.5px solid var(--gris-1); border-radius:var(--r);
    font-family:'Montserrat',sans-serif; font-size:12px; color:var(--azul-oscuro);
    outline:none; background:white;
  }
  .filtros-bar input { width:200px; }

  /* Tabla editable */
  .td-sel select {
    padding:4px 6px; border:1.5px solid var(--gris-1); border-radius:4px;
    font-family:'Montserrat',sans-serif; font-size:11px; color:var(--azul-oscuro);
    outline:none; background:white; width:100%; cursor:pointer;
  }
  .td-sel select:focus { border-color:var(--azul-claro); }
  .td-sel select.sin-asignar { color:var(--gris-3); }

  .badge-sin { background:#FEF0EC; color:#8B3A0F; border:1px solid #F47920;
    font-size:9px; font-weight:700; padding:2px 6px; border-radius:99px; }
  .badge-ok  { background:var(--verde-l); color:var(--verde);
    font-size:9px; font-weight:700; padding:2px 6px; border-radius:99px; }

  .btn-guardar-fila {
    padding:4px 10px; border-radius:var(--r); font-size:11px; font-weight:600;
    border:1.5px solid var(--azul-claro); color:var(--azul-claro); background:white;
    cursor:pointer; transition:all 0.15s; white-space:nowrap;
  }
  .btn-guardar-fila:hover { background:var(--azul-claro); color:white; }
  .btn-guardar-fila.guardado { border-color:var(--verde); color:var(--verde); }
  .btn-guardar-fila.guardando { opacity:0.5; pointer-events:none; }

  .resumen-bar {
    display:flex; gap:1rem; align-items:center;
    padding:0.6rem 1rem; background:#EBF5FC; border-radius:var(--r);
    font-size:12px; margin-bottom:1rem;
  }
  .resumen-num { font-weight:700; color:var(--azul-oscuro); }
  .resumen-naranja { color:var(--naranja); font-weight:700; }
</style>
</head>
<body>
<div class="layout">
  <div id="sidebar-mount"></div>
  <main class="main">

    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Clasificar productos</div>
        <div class="topbar-sub">Asigne Grupo · Subgrupo · Categoría a productos sin clasificar</div>
      </div>
      <div class="topbar-right">
        <button class="btn" onclick="cargarProductos()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8a6 6 0 1 1 2 4.5"/><path d="M2 4v4h4"/></svg>
          Actualizar
        </button>
        <button class="btn btn-primary" onclick="guardarTodos()">
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 8l4 4 8-8"/></svg>
          Guardar todos
        </button>
      </div>
    </div>

    <div class="content">

      <!-- Resumen -->
      <div class="resumen-bar" id="resumen-bar">
        <span>Cargando productos…</span>
      </div>

      <!-- Filtros -->
      <div class="filtros-bar">
        <input type="text" id="filtro-nombre" placeholder="Buscar producto…" oninput="filtrar()">
        <select id="filtro-grupo" onchange="filtrar()">
          <option value="">Todos los grupos</option>
          <option value="SINASIGNACIÓN">Sin asignar</option>
          <option value="Larva">Larva</option>
          <option value="Juveniles">Juveniles</option>
          <option value="Balanceado">Balanceado</option>
          <option value="Insumos Quimicos">Insumos Quimicos</option>
          <option value="Personal">Personal</option>
          <option value="Operativo">Operativo</option>
          <option value="Mantenimiento">Mantenimiento</option>
          <option value="Depreciación">Depreciación</option>
          <option value="Otros Costos">Otros Costos</option>
          <option value="Distribución de Indirectos">Distribución de Indirectos</option>
          <option value="Gastos">Gastos</option>
        </select>
        <select id="filtro-tipo" onchange="filtrar()">
          <option value="">Todos</option>
          <option value="sin">Solo sin asignar</option>
          <option value="con">Solo clasificados</option>
        </select>
        <span style="margin-left:auto;font-size:11px;color:var(--gris-3)" id="lbl-total-filtro"></span>
      </div>

      <!-- Tabla -->
      <div class="tabla-card">
        <div style="overflow-x:auto;max-height:calc(100vh - 280px);overflow-y:auto">
          <table>
            <thead style="position:sticky;top:0">
              <tr>
                <th style="width:140px">Código</th>
                <th>Nombre</th>
                <th style="width:60px">Medida</th>
                <th style="width:150px">Grupo</th>
                <th style="width:190px">Subgrupo</th>
                <th style="width:190px">Categoría</th>
                <th style="width:80px">Estado</th>
                <th style="width:90px"></th>
              </tr>
            </thead>
            <tbody id="tabla-body">
              <tr><td colspan="8" style="padding:2rem;text-align:center;color:var(--gris-3)">Cargando…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<script src="../js/shared.js"></script>
<script>
const _sb = getSupabaseClient();
let _productos = [];
let _filtrados = [];

// Catálogo de grupos, subgrupos y categorías
const CATALOGO = {
  'Larva':                      { sub: ['Larva'],                                                cats: { 'Larva': ['Costo de Larva'] } },
  'Juveniles':                  { sub: ['Juveniles'],                                            cats: { 'Juveniles': ['Costo Inicial Act. Biológico'] } },
  'Balanceado':                 { sub: ['Balanceado'],                                           cats: { 'Balanceado': ['Alimento Balanceado'] } },
  'Insumos Quimicos':           { sub: ['Insumos Quimicos'],                                     cats: { 'Insumos Quimicos': ['Insumos Quimicos Varios'] } },
  'Personal':                   { sub: ['Mano de Obra Directa','Mano de Obra Indirecta'],
                                  cats: { 'Mano de Obra Directa':['Sueldos y Salarios','Beneficios Sociales'], 'Mano de Obra Indirecta':['Sueldos y Salarios','Beneficios Sociales'] } },
  'Operativo':                  { sub: ['Costos de Insumos y Materiales Varios','Servicios Basicos','Servicios de Terceros'],
                                  cats: { 'Costos de Insumos y Materiales Varios':['Materiales Varios','Combustibles y Lubricantes','Herramientas'],
                                          'Servicios Basicos':['Energía Eléctrica','Agua','Telecomunicaciones'],
                                          'Servicios de Terceros':['Servicios de Terceros'] } },
  'Mantenimiento':              { sub: ['Costos de Mantenimiento'],                              cats: { 'Costos de Mantenimiento':['Mantenimiento Maquinaria','Mantenimiento Infraestructura','Repuestos y Accesorios'] } },
  'Depreciación':               { sub: ['Depreciación De Activos Fijos'],                        cats: { 'Depreciación De Activos Fijos':['Dep. Maq y Equipos','Dep. Infraestructura','Dep. Vehículos'] } },
  'Otros Costos':               { sub: ['Imp. Tasa y Contribuciones','Seguros'],                 cats: { 'Imp. Tasa y Contribuciones':['Impuestos y Tasas'], 'Seguros':['Seguros de Activos'] } },
  'Distribución de Indirectos': { sub: ['Indirectos'],                                          cats: { 'Indirectos':['Distribución de Costos Indirectos'] } },
  'Gastos':                     { sub: ['Gasto de Venta','Gastos Administrativos','Gastos Financieros'],
                                  cats: { 'Gasto de Venta':['Gasto de Venta'], 'Gastos Administrativos':['Gastos Administrativos'], 'Gastos Financieros':['Intereses y Comisiones'] } },
};

(async () => {
  if (!await verificarSesion(_sb)) return;
  renderSidebar('clasificar_productos');
  await cargarProductos();
  // Iniciar con filtro de sin asignar
  document.getElementById('filtro-tipo').value = 'sin';
  filtrar();
})();

async function cargarProductos() {
  const emp = sessionStorage.getItem('dcp_empresa');
  const { data } = await _sb.from('productos')
    .select('id, codigo, nombre, medida, grupo, subgrupo, categoria, ultima_importacion')
    .eq('empresa_id', emp)
    .order('grupo').order('nombre');

  _productos = data || [];

  const sinAsignar = _productos.filter(p => !p.grupo || p.grupo === 'SINASIGNACIÓN').length;
  const total      = _productos.length;
  document.getElementById('resumen-bar').innerHTML = `
    <span>Total productos: <span class="resumen-num">${total}</span></span>
    <span style="color:var(--gris-2)">·</span>
    <span>Clasificados: <span class="resumen-num">${total - sinAsignar}</span></span>
    <span style="color:var(--gris-2)">·</span>
    <span>Sin asignar: <span class="resumen-naranja">${sinAsignar}</span></span>
    <span style="margin-left:auto;font-size:11px;color:var(--gris-3)">${sinAsignar > 0 ? 'Filtrando por sin asignar' : '✓ Todos clasificados'}</span>`;

  filtrar();
}

function filtrar() {
  const txtNombre = document.getElementById('filtro-nombre').value.toLowerCase();
  const txtGrupo  = document.getElementById('filtro-grupo').value;
  const txtTipo   = document.getElementById('filtro-tipo').value;

  _filtrados = _productos.filter(p => {
    const sinAsig = !p.grupo || p.grupo === 'SINASIGNACIÓN';
    if (txtNombre && !(p.nombre||'').toLowerCase().includes(txtNombre) && !p.codigo.toLowerCase().includes(txtNombre)) return false;
    if (txtGrupo && (p.grupo || 'SINASIGNACIÓN') !== txtGrupo) return false;
    if (txtTipo === 'sin' && !sinAsig) return false;
    if (txtTipo === 'con' && sinAsig) return false;
    return true;
  });

  document.getElementById('lbl-total-filtro').textContent = `${_filtrados.length} producto${_filtrados.length !== 1 ? 's' : ''}`;
  renderTabla();
}

function renderTabla() {
  if (!_filtrados.length) {
    document.getElementById('tabla-body').innerHTML =
      `<tr><td colspan="8" style="padding:2rem;text-align:center;color:var(--gris-3)">Sin productos con estos filtros.</td></tr>`;
    return;
  }

  document.getElementById('tabla-body').innerHTML = _filtrados.map((p, i) => {
    const sinAsig  = !p.grupo || p.grupo === 'SINASIGNACIÓN';
    // Si tiene SINASIGNACIÓN, arranca vacío para forzar al usuario a elegir
    // Si ya tiene un grupo real, lo preselecciona
    const grupoVal = (!p.grupo || p.grupo === 'SINASIGNACIÓN') ? '' : (p.grupo || '');
    const subVal   = p.subgrupo || '';
    const catVal   = p.categoria || '';

    const opGrupos = `<option value="">— Seleccione —</option>` +
      Object.keys(CATALOGO).map(g => `<option value="${g}" ${grupoVal===g?'selected':''}>${g}</option>`).join('');

    const subgrupos = grupoVal && CATALOGO[grupoVal] ? CATALOGO[grupoVal].sub : [];
    const opSubs = `<option value="">— Seleccione —</option>` +
      subgrupos.map(s => `<option value="${s}" ${subVal===s?'selected':''}>${s}</option>`).join('');

    const cats = grupoVal && subVal && CATALOGO[grupoVal]?.cats?.[subVal] ? CATALOGO[grupoVal].cats[subVal] : [];
    const opCats = `<option value="">— Seleccione —</option>` +
      cats.map(c => `<option value="${c}" ${catVal===c?'selected':''}>${c}</option>`).join('');

    return `<tr id="fila-${p.id}">
      <td class="mono" style="font-size:11px">${p.codigo}</td>
      <td style="font-size:12px;max-width:260px" title="${p.nombre||''}">${p.nombre||p.codigo}</td>
      <td style="font-size:11px;color:var(--gris-3)">${p.medida||''}</td>
      <td class="td-sel">
        <select id="g-${p.id}" onchange="onGrupoChange('${p.id}')" class="${sinAsig?'sin-asignar':''}">
          ${opGrupos}
        </select>
      </td>
      <td class="td-sel">
        <select id="s-${p.id}" onchange="onSubChange('${p.id}')">
          ${opSubs}
        </select>
      </td>
      <td class="td-sel">
        <select id="c-${p.id}">
          ${opCats}
        </select>
      </td>
      <td style="text-align:center">
        ${sinAsig
          ? '<span class="badge-sin">SIN ASIGNAR</span>'
          : '<span class="badge-ok">OK</span>'}
      </td>
      <td>
        <button class="btn-guardar-fila" id="btn-${p.id}" onclick="guardarFila('${p.id}')">Guardar</button>
      </td>
    </tr>`;
  }).join('');
}

function onGrupoChange(id) {
  const grupo = document.getElementById('g-' + id)?.value || '';
  const sSel  = document.getElementById('s-' + id);
  const cSel  = document.getElementById('c-' + id);
  const subgrupos = grupo && CATALOGO[grupo] ? CATALOGO[grupo].sub : [];
  sSel.innerHTML = `<option value="">— Seleccione —</option>` +
    subgrupos.map(s => `<option value="${s}">${s}</option>`).join('');
  cSel.innerHTML = `<option value="">— Seleccione —</option>`;
  // Si solo hay un subgrupo, seleccionarlo automáticamente
  if (subgrupos.length === 1) {
    sSel.value = subgrupos[0];
    onSubChange(id);
  }
}

function onSubChange(id) {
  const grupo = document.getElementById('g-' + id)?.value || '';
  const sub   = document.getElementById('s-' + id)?.value || '';
  const cSel  = document.getElementById('c-' + id);
  const cats  = grupo && sub && CATALOGO[grupo]?.cats?.[sub] ? CATALOGO[grupo].cats[sub] : [];
  cSel.innerHTML = `<option value="">— Seleccione —</option>` +
    cats.map(c => `<option value="${c}">${c}</option>`).join('');
  if (cats.length === 1) cSel.value = cats[0];
}

async function guardarFila(id) {
  const grupo = document.getElementById('g-' + id)?.value;
  const sub   = document.getElementById('s-' + id)?.value;
  const cat   = document.getElementById('c-' + id)?.value;
  const btn   = document.getElementById('btn-' + id);

  if (!grupo) { toast('Seleccione un grupo.', 'warning'); return; }

  btn.className = 'btn-guardar-fila guardando';
  btn.textContent = 'Guardando…';

  const emp = sessionStorage.getItem('dcp_empresa');
  const { error } = await _sb.from('productos')
    .update({ grupo, subgrupo: sub||null, categoria: cat||null })
    .eq('id', id).eq('empresa_id', emp);

  if (error) {
    toast('Error: ' + error.message, 'error');
    btn.className = 'btn-guardar-fila';
    btn.textContent = 'Guardar';
    return;
  }

  // Actualizar estado local
  const prod = _productos.find(p => p.id === id);
  if (prod) { prod.grupo = grupo; prod.subgrupo = sub; prod.categoria = cat; }

  // Actualizar badge en la fila
  const fila = document.getElementById('fila-' + id);
  if (fila) {
    const badgeCell = fila.cells[6];
    if (badgeCell) badgeCell.innerHTML = '<span class="badge-ok">OK</span>';
    const gSel = document.getElementById('g-' + id);
    if (gSel) gSel.classList.remove('sin-asignar');
  }

  btn.className = 'btn-guardar-fila guardado';
  btn.textContent = '✓ Guardado';
  setTimeout(() => {
    btn.className = 'btn-guardar-fila';
    btn.textContent = 'Guardar';
  }, 2000);

  // Actualizar contadores
  const sinAsignar = _productos.filter(p => !p.grupo || p.grupo === 'SINASIGNACIÓN').length;
  const total = _productos.length;
  document.getElementById('resumen-bar').innerHTML = `
    <span>Total productos: <span class="resumen-num">${total}</span></span>
    <span style="color:var(--gris-2)">·</span>
    <span>Clasificados: <span class="resumen-num">${total - sinAsignar}</span></span>
    <span style="color:var(--gris-2)">·</span>
    <span>Sin asignar: <span class="resumen-naranja">${sinAsignar}</span></span>`;
}

async function guardarTodos() {
  const sinGrupo = _filtrados.filter(p => !document.getElementById('g-' + p.id)?.value);
  if (sinGrupo.length > 0) {
    toast(`${sinGrupo.length} producto(s) sin grupo seleccionado. Asigne todos antes de guardar.`, 'warning');
    return;
  }
  const btn = document.querySelector('.btn-primary');
  btn.disabled = true;
  btn.textContent = 'Guardando…';
  let ok = 0, err = 0;
  for (const p of _filtrados) {
    const grupo = document.getElementById('g-' + p.id)?.value;
    const sub   = document.getElementById('s-' + p.id)?.value;
    const cat   = document.getElementById('c-' + p.id)?.value;
    if (!grupo) { err++; continue; }
    const emp = sessionStorage.getItem('dcp_empresa');
    const { error } = await _sb.from('productos')
      .update({ grupo, subgrupo: sub||null, categoria: cat||null })
      .eq('id', p.id).eq('empresa_id', emp);
    if (error) { err++; } else { ok++; p.grupo = grupo; p.subgrupo = sub; p.categoria = cat; }
  }
  btn.disabled = false;
  btn.textContent = 'Guardar todos';
  toast(`${ok} productos guardados${err > 0 ? ` · ${err} errores` : ''}.`, err > 0 ? 'warning' : 'success');
  await cargarProductos();
}
</script>
</body>
</html>
