<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Costos Piscinas · LUKMAR S.A.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --azul-oscuro:  #1A3A6B;
    --azul-medio:   #1E6FBF;
    --azul-claro:   #29ABE2;
    --azul-light:   #7EC8E3;
    --naranja:      #F47920;
    --blanco:       #FFFFFF;
    --fondo-page:   #0F2040;
    --gris-1:       #EAEEF3;
    --gris-2:       #C2CDD9;
    --gris-3:       #7A8FA6;
    --error-bg:     #FEF0EC;
    --error-borde:  #F47920;
    --error-texto:  #8B3A0F;
    --r: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--fondo-page);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
  }

  /* Tarjeta central — idéntica al estilo EQ */
  .card {
    background: var(--blanco);
    border-radius: 16px;
    padding: 2.75rem 2.5rem 2.25rem;
    width: 100%;
    max-width: 440px;
    box-shadow: 0 24px 64px rgba(0,0,0,0.35);
  }

  /* Logo Lukmar centrado */
  .logo-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 1.75rem;
  }
  .logo-wrap img {
    height: 52px;
    width: auto;
    display: block;
  }

  /* Divisor */
  .divider {
    border: none;
    border-top: 1px solid var(--gris-1);
    margin: 0 0 1.75rem;
  }

  /* Textos */
  .form-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--azul-oscuro);
    margin-bottom: 4px;
  }
  .form-sub {
    font-size: 12px;
    color: var(--gris-3);
    margin-bottom: 1.75rem;
    font-weight: 400;
  }

  /* Campos */
  .campo { margin-bottom: 1.1rem; }
  .campo label {
    display: block;
    font-size: 10px;
    font-weight: 700;
    color: var(--gris-3);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 7px;
  }
  .campo input {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--gris-1);
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    color: var(--azul-oscuro);
    background: #F7F9FB;
    transition: border-color 0.15s, background 0.15s;
    outline: none;
  }
  .campo input:focus {
    border-color: var(--azul-claro);
    background: var(--blanco);
  }
  .campo input::placeholder { color: var(--gris-2); }

  /* Botón ingresar */
  .btn-login {
    width: 100%;
    padding: 13px;
    background: var(--azul-claro);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    margin-top: 0.5rem;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn-login:hover { background: var(--azul-medio); }
  .btn-login:active { transform: scale(0.99); }
  .btn-login:disabled { background: var(--gris-2); cursor: not-allowed; }

  .spinner {
    width: 15px; height: 15px;
    border: 2px solid rgba(255,255,255,0.4);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Error */
  .msg-error {
    background: var(--error-bg);
    border-left: 3px solid var(--error-borde);
    color: var(--error-texto);
    font-size: 12px;
    font-weight: 500;
    padding: 10px 14px;
    border-radius: 0 8px 8px 0;
    margin-top: 1rem;
    display: none;
    line-height: 1.5;
  }
  .msg-error.visible { display: block; }

  /* Footer de la tarjeta */
  .card-footer {
    margin-top: 2rem;
    padding-top: 1.25rem;
    border-top: 1px solid var(--gris-1);
    text-align: center;
    font-size: 11px;
    color: var(--gris-3);
    line-height: 1.6;
  }
  .card-footer strong { color: var(--azul-oscuro); }
  .card-footer .dot { margin: 0 6px; color: var(--gris-2); }

  /* Roles pills */
  .roles-row {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 0.6rem;
    flex-wrap: wrap;
  }
  .rol-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 99px;
    letter-spacing: 0.04em;
  }
  .pill-admin    { background: #E8EDF8; color: var(--azul-oscuro); }
  .pill-contador { background: #E5F6FC; color: #0D6E8A; }
  .pill-gerente  { background: var(--gris-1); color: var(--gris-3); }
  .rol-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }
</style>
</head>
<body>

<div class="card">

  <!-- Logo oficial Lukmar horizontal -->
  <div class="logo-wrap">
    <img src="Logo_Horizontal_Lukmar.png" alt="LUKMAR S.A.">
  </div>

  <hr class="divider">

  <div class="form-title">Acceso al Dashboard</div>
  <div class="form-sub">Ingresa tus credenciales para continuar</div>

  <div class="campo">
    <label>Correo electrónico</label>
    <input type="email" id="email" placeholder="usuario@lukmar.com.ec" autocomplete="email">
  </div>
  <div class="campo">
    <label>Contraseña</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
  </div>

  <button class="btn-login" id="btn-login" onclick="iniciarSesion()">
    <span id="btn-texto">Ingresar</span>
    <div class="spinner" id="spinner"></div>
  </button>

  <div class="msg-error" id="msg-error">
    Credenciales incorrectas o sin acceso. Contacte al administrador.
  </div>

  <div class="card-footer">
    <div style="font-size:11px;color:var(--gris-3)">
      EQSolutions © 2025 by OR · Acceso restringido
    </div>
    <div style="font-size:11px;color:var(--azul-claro);font-weight:600;margin-top:4px;letter-spacing:0.02em">
      EQ Intelligence Platform
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js"></script>
<script>
const _sb = getSupabaseClient();

async function iniciarSesion() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const btn      = document.getElementById('btn-login');
  const spinner  = document.getElementById('spinner');
  const texto    = document.getElementById('btn-texto');
  const msgErr   = document.getElementById('msg-error');

  if (!email || !password) {
    msgErr.textContent = 'Ingrese correo y contraseña.';
    msgErr.classList.add('visible');
    return;
  }

  btn.disabled = true;
  spinner.style.display = 'block';
  texto.textContent = 'Verificando…';
  msgErr.classList.remove('visible');

  try {
    const { data, error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) throw error;

    const { data: usuario } = await _sb.from('usuarios')
      .select('rol, nombre, empresa_id')
      .eq('id', data.user.id)
      .single();

    if (!usuario) throw new Error('Usuario sin perfil asignado. Contacte al administrador.');

    sessionStorage.setItem('dcp_rol',     usuario.rol);
    sessionStorage.setItem('dcp_nombre',  usuario.nombre || email);
    sessionStorage.setItem('dcp_empresa', usuario.empresa_id);

    window.location.href = 'pages/dashboard.html';

  } catch (err) {
    msgErr.textContent = err.message || 'Error al ingresar. Intente nuevamente.';
    msgErr.classList.add('visible');
    btn.disabled = false;
    spinner.style.display = 'none';
    texto.textContent = 'Ingresar';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') iniciarSesion(); });

(async () => {
  const { data } = await _sb.auth.getSession();
  if (data.session) window.location.href = 'pages/dashboard.html';
})();
</script>
</body>
</html>
